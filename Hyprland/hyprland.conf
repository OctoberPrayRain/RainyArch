# This is an example Hyprland config file.
# Refer to the wiki for more information.
# https://wiki.hyprland.org/Configuring/

# Please note not all available settings / options are set here.
# For a full list, see the wiki

# You can split this configuration into multiple files
# Create your files separately and then link them to this file like this:
# source = ~/.config/hypr/myColors.conf


################
### MONITORS ###
################

# See https://wiki.hyprland.org/Configuring/Monitors/
monitor=HDMI-1,2560x1440@120,auto,auto
monitor=eDP-1,prefferd,auto,auto

###################
### MY PROGRAMS ###
###################

# See https://wiki.hyprland.org/Configuring/Keywords/

# Set programs that you use
$terminal = uwsm app -- kitty
$fileManager = uwsm app -- kitty yazi
$fileManagerGUI = uwsm app -- dolphin
$menu = uwsm app -- rofi --show drun

#################
### AUTOSTART ###
#################

# Autostart necessary processes (like notifications daemons, status bars, etc.)
# Or execute your favorite apps at launch like this:

# exec-once = $terminal

# exec-once = nm-applet &
# exec-once = waybar & hyprpaper & firefox
exec-once = uwsm app -- dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = uwsm app -- hyprpaper
exec-once = uwsm app -- systemctl --user start hyprpolkitagent
exec-once = uwsm app -- systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = uwsm app -- wl-paste --type --watch cliphist store
exec-once = uwsm app -- wl-paste --type text --watch cliphist store
exec-once = uwsm app -- wl-paste --type image --watch cliphist store
exec-once = uwsm app -- waybar
exec-once = uwsm app -- nm-applet
exec-once = uwsm app -- fcitx5 -d --replace
exec-once = uwsm app -- dunst
exec-once = uwsm app -- /usr/lib/polkit-kde-authentication-agent-1
exec-once = uwsm app -- udiskie&
exec-once = uwsm app -- systemctl --user enable pulseaudio --now
exec-once = uwsm app -- sh ~/.config/hypr/scripts/monitor-switch.sh
#exec-once = uwsm app -- XDG_MENU_PREFIX=arch-
#############################
### ENVIRONMENT VARIABLES ###
#############################

# See https://wiki.hyprland.org/Configuring/Environment-variables/

env = XCURSOR_SIZE,24
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland
env = ELECTRON_OZONE_PLATFORM_HINT,auto
env = EDITOR,vim
env = MOZ_ENABLE_WAYLAND,1
#env = GDK_BACKEN=x11
env = QT_QPA_PLATFORM,xcb
env = QT_QPA_PLATFORMTHEME,qt5ct

env = QT_AUTO_SCREEN_SCALE_FACTOR,1

env = QT_SCALE_FACTOR,1
env = GDK_SCALE,1
env = ELM_SCALE,1
env = GDK_DPI_SCALE,1.15

env = QT_IM_MODULE,fcitx
env = XMODIFIERS,@im=fcitx


env = LIBVA_DRIVER_NAME,nvidia
env = GBM_BACKEND,nvidia-drm
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = NVD_BACKEND,direct
###################
### PERMISSIONS ###
###################

